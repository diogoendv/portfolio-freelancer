<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Exemplo{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dark: '#0f172a', neon: { cyan: '#22d3ee', violet: '#a78bfa' } },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .card-glass { background: rgba(15,23,42,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(148,163,184,0.1); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-dark text-slate-200 font-sans antialiased min-h-screen">
  <a href="/#ideias" class="fixed top-4 left-4 z-50 inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800/90 border border-slate-600 text-slate-400 hover:text-white hover:border-slate-500 text-sm transition" title="Voltar ao portfólio">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Voltar ao portfólio
  </a>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
