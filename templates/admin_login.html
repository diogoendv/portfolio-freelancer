<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <title>Admin — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <h1 class="text-xl font-bold text-white mb-6 text-center">Painel Admin</h1>
    <form id="login-form" class="bg-slate-800/60 rounded-xl p-6 border border-slate-700 space-y-4">
      <div>
        <label for="password" class="block text-sm text-slate-400 mb-2">Senha</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white placeholder-slate-500 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none"
          placeholder="Senha do admin" />
      </div>
      <p id="login-error" class="text-red-400 text-sm hidden"></p>
      <button type="submit" class="w-full py-3 rounded-lg bg-cyan-500/20 text-cyan-400 border border-cyan-500/50 font-medium hover:bg-cyan-500/30 transition">
        Entrar
      </button>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var pwd = document.getElementById('password').value;
      var err = document.getElementById('login-error');
      fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) window.location.href = '/admin';
          else { err.textContent = data.error || 'Erro'; err.classList.remove('hidden'); }
        })
        .catch(function() { err.textContent = 'Erro de conexão'; err.classList.remove('hidden'); });
    });
  </script>
</body>
</html>
