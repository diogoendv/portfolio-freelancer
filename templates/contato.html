{% extends "base.html" %}
{% block title %}Contato{% endblock %}

{% block content %}
  <section class="py-24 px-4 bg-dark min-h-screen">
    <div class="max-w-xl mx-auto">
      <h1 class="text-3xl font-bold text-white mb-2">Contato / Briefing</h1>
      <p class="text-slate-400 mb-8">Envie sua ideia; validamos o e-mail antes de salvar.</p>
      <form id="form-contact" class="card-glass rounded-2xl p-8 space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium text-slate-300 mb-2">Nome</label>
          <input type="text" id="name" name="name" required
            class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-500 focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan outline-none transition" placeholder="Seu nome" />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-2">E-mail</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-500 focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan outline-none transition" placeholder="seu@email.com" />
        </div>
        <div>
          <label for="service" class="block text-sm font-medium text-slate-300 mb-2">Serviço de interesse</label>
          <select id="service" name="service"
            class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan outline-none transition">
            <option value="">Selecione</option>
            <option value="conceito">Conceito / Ideia de Site</option>
            <option value="desenvolvimento">Desenvolvimento Personalizado</option>
          </select>
        </div>
        <div>
          <label for="message" class="block text-sm font-medium text-slate-300 mb-2">Mensagem / Briefing</label>
          <textarea id="message" name="message" rows="4" required
            class="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-slate-500 focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan outline-none transition resize-none" placeholder="Conte seu projeto..."></textarea>
        </div>
        <p id="form-feedback" class="text-sm hidden"></p>
        <button type="submit" class="btn-hover w-full py-3 rounded-lg bg-neon-cyan/20 text-neon-cyan border border-neon-cyan/50 font-medium">
          Enviar
        </button>
      </form>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script>
    (function() {
      var form = document.getElementById('form-contact');
      var feedback = document.getElementById('form-feedback');
      function showFeedback(msg, isError) {
        feedback.textContent = msg;
        feedback.className = 'text-sm ' + (isError ? 'text-red-400' : 'text-neon-cyan');
        feedback.classList.remove('hidden');
      }
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var payload = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          service: document.getElementById('service').value,
          message: document.getElementById('message').value
        };
        fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function(r) {
            return r.text().then(function(text) {
              var data = {};
              try { data = text ? JSON.parse(text) : {}; } catch (_) {}
              return { status: r.status, data: data, ok: r.ok };
            });
          })
          .then(function(res) {
            if (res.ok && res.data.success) {
              showFeedback(res.data.message, false);
              form.reset();
            } else {
              showFeedback(res.data.error || 'Erro ao enviar.', true);
            }
          })
          .catch(function() { showFeedback('Erro de conexão. Tente novamente.', true); });
      });
    })();
  </script>
{% endblock %}
